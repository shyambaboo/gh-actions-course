name: 04- Workflow Action

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 04-using-actions/react-app

    steps:
      - name: Check out Code
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
            node-version: '20.x'
      - name: Install Dependencies
        run: npm ci
       
      - name: Run Unit Tests
        run: npm run test