name: 03- Workflow- Runners

on: push

jobs:
  ubuntu-eco:
    runs-on: ubuntu-latest
    steps:
      - name: Show OS
        run: |
          echo "This job is running on Ubuntu Server."
          echo "Runner OS: $RUNNER_OS"
  
  windows:
    runs-on: windows-latest
    steps:
      - name: Show OS
        run: |
          echo "This job is running on Windows Server."
          echo "Runner OS: $RUNNER_OS"

