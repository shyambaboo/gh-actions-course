name: 03- Workflow- Runners

on: workflow_dispatch

jobs:
  ubuntu-echo:
    runs-on: ubuntu-latest
    steps:
      - name: Show OS
        run: |
          echo "This job is running on Ubuntu Server."
          echo "Runner OS: $RUNNER_OS"
        
  windows-echo:
    runs-on: windows-latest
    steps:
      - name: Show OS
        shell: bash
        run: |
            echo "This job is running on Windows Server."
            echo "Runner OS: $RUNNER_OS"
            
  mac-echo:
    runs-on: macos-latest
    steps:
      - name: Show OS
        run: |
          echo "This job is running on MacOS Server."
          echo "Runner OS: $RUNNER_OS"

